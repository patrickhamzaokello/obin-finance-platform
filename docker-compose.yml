services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    image: obin-finance-platform:latest
    container_name: obin-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production   # must contain DATABASE_URL pointing at Neon
